<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-color: skyblue;

            }
            .calculatore{
                width: 280px;
                padding: 20px;
                background-color: rgb(13, 131, 221);
                border-radius: 10px;
                align-items: center;
            }
            #display {
                width: 100%;
                height: 50px;
                background-color: #222;
                color: white;
                font-size: 2em;
                text-align: right;
                padding: 10px;
                border: none;
                margin-bottom: 10px;
                border-radius: 5px;
            }
            .buttons{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            .button {
                padding: 20px;
                font-size: 1.5em;
                background-color: white;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }
            .button:hover {
                background-color: #555;
            }
            .button:active {
                background-color: #666;
            }
        </style>
    </head>
    <body>
        <center>
        <div class="calculatore">
            <input type="text" id="display" disabled/>
            <div class="buttons">
                <div class="button" onclick="appendValue('1')"><button border="0">1</button></div>
                <div class="button" onclick="appendValue('2')"><button border="0">2</button></div>
                <div class="button" onclick="appendValue('3')"><button border="0">3</button></div>
                <div class="button" onclick="cleardisplay()"><button border="0">C</button></div>
                <div class="button" onclick="appendValue('4')"><button border="0">4</button></div>
                <div class="button" onclick="appendValue('5')"><button border="0">5</button></div>
                <div class="button" onclick="appendValue('6')"><button border="0">6</button></div>
                <div class="button" onclick="appendValue('+')"><button border="0">+</button></div>
                <div class="button" onclick="appendValue('7')"><button border="0">7</button></div>
                <div class="button" onclick="appendValue('8')"><button border="0">8</button></div>
                <div class="button" onclick="appendValue('9')"><button border="0">9</button></div>
                <div class="button" onclick="appendValue('-')"><button border="0">-</button></div>
                <div class="button" onclick="appendValue('0')"><button border="0">0</button></div>
                <div class="button" onclick="appendValue('.')"><button border="0">.</button></div>
                <div class="button" onclick="appendValue('*')"><button border="0">*</button></div>
                <div class="button" onclick="appendValue('/')"><button border="0">/</button></div>
                <div class="button" onclick="calculate() "><button border="0">=</button></div>
                
            </div>
        </div>
        <script>
            function appendValue(value) {
              document.getElementById('display').value += value;
            }
            function cleardisplay() {
              document.getElementById('display').value = '0';
            }
            function calculate() {
                let display = document.getElementById('display');
            try {
                display.value = eval(display.value);
            }
            catch (e) {
                display.value = 'Error';
            }
            }
        </script>
        </center>
    </body>
</html>
