<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <style>
            body{
                background-color: skyblue;

            }
            .calculatore{
                width: 280px;
                padding: 20px;
                background-color: rgb(13, 131, 221);
                border-radius: 10px;
                align-items: center;
            }
            #display {
                width: 100%;
                height: 50px;
                background-color: #222;
                color: white;
                font-size: 2em;
                text-align: right;
                padding: 10px;
                border: none;
                margin-bottom: 10px;
                border-radius: 5px;
            }
            .buttons{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            .bt{
                padding: 12px 12px;
                font-size: 16px;
                border: none;
                background-color: white
            }
            .button {
                padding: 10px;
                font-size: 16px;
                background-color: white;
                color: white;
                border: none;
                border-radius: 1px;
                cursor: pointer;
                transition: background-color 0.3s;
            }
            .button:hover {
                background-color: #555;
            }
            .button:active {
                background-color: #666;
            }
        </style>
    </head>
    <body>
        <center>
        <div class="calculatore">
            <input type="text" id="display" disabled/>
            <div class="buttons">
                <div class="button" onclick="appendValue('1')"><button class="bt">1</button></div>
                <div class="button" onclick="appendValue('2')"><button class="bt">2</button></div>
                <div class="button" onclick="appendValue('3')"><button class="bt">3</button></div>
                <div class="button" onclick="cleardisplay()"><button class="bt">C</button></div>
                <div class="button" onclick="appendValue('4')"><button class="bt">4</button></div>
                <div class="button" onclick="appendValue('5')"><button class="bt">5</button></div>
                <div class="button" onclick="appendValue('6')"><button class="bt">6</button></div>
                <div class="button" onclick="appendValue('+')"><button class="bt">+</button></div>
                <div class="button" onclick="appendValue('7')"><button class="bt">7</button></div>
                <div class="button" onclick="appendValue('8')"><button class="bt">8</button></div>
                <div class="button" onclick="appendValue('9')"><button class="bt">9</button></div>
                <div class="button" onclick="appendValue('-')"><button class="bt">-</button></div>
                <div class="button" onclick="appendValue('0')"><button class="bt">0</button></div>
                <div class="button" onclick="appendValue('.')"><button class="bt">.</button></div>
                <div class="button" onclick="appendValue('*')"><button class="bt">*</button></div>
                <div class="button" onclick="appendValue('/')"><button class="bt">/</button></div>
                <div class="button" onclick="calculate() "><button class="bt">=</button></div>
                
            </div>
        </div>
        <script>
            function appendValue(value) {
              document.getElementById('display').value += value;
            }
            function cleardisplay() {
              document.getElementById('display').value = '0';
            }
            function calculate() {
                let display = document.getElementById('display');
            try {
                display.value = eval(display.value);
            }
            catch (e) {
                display.value = 'Error';
            }
            }
        </script>
        </center>
    </body>
</html>
